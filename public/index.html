<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shader - Gallery</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Loading screen -->
  <div id="loading">
    <div id="loading-text">Initializing Gallery</div>
    <div id="loading-bar"><div id="loading-progress"></div></div>
  </div>

  <!-- Three.js canvas -->
  <div id="canvas-container"></div>

  <audio id="ambiance" src="/audio/djovan-infinite-energy-within-497084.mp3" loop preload="auto"></audio>
  <!-- HUD -->
  <div id="hud">
    <div id="museum-title">Shader<span> ◆ </span>Gallery</div>
    <button id="mute-btn" title="Activer le son">
      <img id="mute-icon" src="/img/sound.png" alt="son" />
    </button>
    <div id="nav-hint">
      Click on a frame to open<br>
      ESC to exit
    </div>
  </div>

  <div id="interaction-hint">Click on the frames to interact with them</div>

  <div id="artwork-overlay">
    <div id="artwork-frame">
      <!-- Canvas injected by JS -->
    </div>
    <div id="artwork-info">
      <div>
        <div id="artwork-title-display"></div>
        <div id="artwork-subtitle"></div>
      </div>
      <button id="close-btn">ESC · CLOSE</button>
    </div>
    <div id="shader-controls" class="hidden">
      <div class="ctrl-row" data-index="0">
        <label></label>
        <input type="range">
        <span>0.3</span>
      </div>
      <div class="ctrl-row" data-index="1">
        <label></label>
        <input type="range">
        <span></span>
      </div>
      <div class="ctrl-row" data-index="2">
        <label></label>
        <input type="range">
        <span></span>
      </div>
      <div class="ctrl-row" data-index="3">
        <label></label>
        <input type="range">
        <span></span>
      </div>
    </div>
  </div>

  <!-- Artwork renderers -->
  <script src="/js/artwork1.js"></script>
  <script src="/js/artwork2.js"></script>
  <script src="/js/artwork3.js"></script>
  <script src="/js/artwork4.js"></script>

  <!-- Main scene -->
  <script type="module" src="/js/gallery.js"></script>

</body>
</html>
